name: Build and Release DLL+LIB

on:
  push:
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Build DLL and LIB
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Extract Version
        id: extract
        run: |
          $version = (Select-String -Path "Cargo.toml" -Pattern 'version\s*=\s*"(.*?)"' | ForEach-Object {
            ($_ -match '"(.*?)"') | Out-Null
            $matches[1]
          })
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.extract.outputs.version }}
          tag_name: v${{ steps.extract.outputs.version }}
          files: |
            target/x86_64-pc-windows-msvc/release/*.dll
            target/x86_64-pc-windows-msvc/release/*.lib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
