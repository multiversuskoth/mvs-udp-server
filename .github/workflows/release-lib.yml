name: Build and Release DLL+LIB

on:
  push:
    branches: [main]
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Build DLL and LIB
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Extract Version
        id: extract
        shell: pwsh
        run: |
          $content = Get-Content Cargo.toml
          $inPackage = $false
          foreach ($line in $content) {
            if ($line -match '^\[.*\]') {
              $inPackage = ($line -eq '[package]')
            } elseif ($inPackage -and $line -match '^\s*version\s*=\s*"(.*?)"') {
              $matches[1] | Out-File -FilePath version.txt -Encoding utf8
              echo "version=$($matches[1])" >> $env:GITHUB_OUTPUT
              break
            }
          }


      - name: Generate timestamp
        id: timestamp
        run: |
          $now = Get-Date -Format "dd-MM-yyyy HH:mm"
          echo "now=$now" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.extract.outputs.version }} - ${{ steps.timestamp.outputs.now }}
          tag_name: v${{ steps.extract.outputs.version }}
          files: |
            target/x86_64-pc-windows-msvc/release/*.dll
            target/x86_64-pc-windows-msvc/release/*.lib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
